name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Deploy mode: soft (rebuild only) or hard (rebuild + seed)'
        required: false
        default: 'soft'
        type: choice
        options:
          - soft
          - hard

# В matrix нельзя ссылаться на secrets — три параллельных job.
jobs:
  deploy-ru:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Deploy RU via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          PROJECT_NAME: ${{ secrets.RU_PROJECT_NAME }}
          DATABASE_URI: ${{ secrets.RU_DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.RU_PAYLOAD_SECRET }}
          ADMIN_EMAIL: ${{ secrets.RU_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.RU_ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.RU_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.RU_SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.RU_SMTP_SECURE }}
          SMTP_USER: ${{ secrets.RU_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.RU_SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.RU_SMTP_FROM }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.RU_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.RU_NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_LANG: ${{ secrets.RU_LANG }}
          NEXT_PUBLIC_REPLAIN_ID: ${{ secrets.RU_NEXT_PUBLIC_REPLAIN_ID }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ secrets.RU_NEXT_PUBLIC_CALENDLY_URL }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || secrets.DEPLOY_MODE || 'soft' }}
        with:
          host: ${{ secrets.RU_SSH_HOST }}
          username: ${{ secrets.RU_SSH_USER }}
          key: ${{ secrets.RU_SSH_KEY }}
          port: ${{ secrets.RU_SSH_PORT || 22 }}
          command_timeout: 25m
          script_path: scripts/github-deploy-remote.sh
          envs: PROJECT_NAME,DATABASE_URI,PAYLOAD_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_GTM_ID,NEXT_PUBLIC_LANG,NEXT_PUBLIC_REPLAIN_ID,NEXT_PUBLIC_CALENDLY_URL,DEPLOY_MODE

  deploy-en:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Deploy EN via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          PROJECT_NAME: ${{ secrets.EN_PROJECT_NAME }}
          DATABASE_URI: ${{ secrets.EN_DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.EN_PAYLOAD_SECRET }}
          ADMIN_EMAIL: ${{ secrets.EN_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.EN_ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.EN_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.EN_SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.EN_SMTP_SECURE }}
          SMTP_USER: ${{ secrets.EN_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.EN_SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.EN_SMTP_FROM }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.EN_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.EN_NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_LANG: ${{ secrets.EN_LANG }}
          NEXT_PUBLIC_REPLAIN_ID: ${{ secrets.EN_NEXT_PUBLIC_REPLAIN_ID }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ secrets.EN_NEXT_PUBLIC_CALENDLY_URL }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || secrets.DEPLOY_MODE || 'soft' }}
        with:
          host: ${{ secrets.EN_SSH_HOST }}
          username: ${{ secrets.EN_SSH_USER }}
          key: ${{ secrets.EN_SSH_KEY }}
          port: ${{ secrets.EN_SSH_PORT || 22 }}
          command_timeout: 25m
          script_path: scripts/github-deploy-remote.sh
          envs: PROJECT_NAME,DATABASE_URI,PAYLOAD_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_GTM_ID,NEXT_PUBLIC_LANG,NEXT_PUBLIC_REPLAIN_ID,NEXT_PUBLIC_CALENDLY_URL,DEPLOY_MODE

  deploy-ae:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Deploy AE via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          PROJECT_NAME: ${{ secrets.AE_PROJECT_NAME }}
          DATABASE_URI: ${{ secrets.AE_DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.AE_PAYLOAD_SECRET }}
          ADMIN_EMAIL: ${{ secrets.AE_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.AE_ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.AE_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.AE_SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.AE_SMTP_SECURE }}
          SMTP_USER: ${{ secrets.AE_SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.AE_SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.AE_SMTP_FROM }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.AE_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.AE_NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_LANG: ${{ secrets.AE_LANG }}
          NEXT_PUBLIC_REPLAIN_ID: ${{ secrets.AE_NEXT_PUBLIC_REPLAIN_ID }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ secrets.AE_NEXT_PUBLIC_CALENDLY_URL }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || secrets.DEPLOY_MODE || 'soft' }}
        with:
          host: ${{ secrets.AE_SSH_HOST }}
          username: ${{ secrets.AE_SSH_USER }}
          key: ${{ secrets.AE_SSH_KEY }}
          port: ${{ secrets.AE_SSH_PORT || 22 }}
          command_timeout: 25m
          script_path: scripts/github-deploy-remote.sh
          envs: PROJECT_NAME,DATABASE_URI,PAYLOAD_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASSWORD,SMTP_FROM,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_GTM_ID,NEXT_PUBLIC_LANG,NEXT_PUBLIC_REPLAIN_ID,NEXT_PUBLIC_CALENDLY_URL,DEPLOY_MODE
